<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>支付结果 — DeepSeal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .result-page{max-width:560px;margin:0 auto;padding:140px 24px 80px;text-align:center}
    .result-icon{width:72px;height:72px;border-radius:50%;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;font-size:36px}
    .result-icon.pending{background:#fef3c7;color:#d97706}
    .result-icon.success{background:#d1fae5;color:#059669}
    .result-icon.fail{background:#fee2e2;color:#dc2626}
    .result-page h1{font-size:28px;font-weight:800;color:#0f172a;margin-bottom:8px}
    .result-page .desc{color:#64748b;font-size:16px;margin-bottom:32px}
    .code-box{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:24px;text-align:left}
    .code-label{font-size:12px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
    .code-value{font-family:'JetBrains Mono',monospace;font-size:14px;color:#0f172a;word-break:break-all;line-height:1.6;background:#fff;padding:12px;border-radius:8px;border:1px solid #e2e8f0;user-select:all}
    .btn-copy{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;background:#6366F1;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;margin-right:8px}
    .btn-copy:hover{background:#4f46e5;transform:translateY(-1px)}
    .btn-back{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;background:#fff;color:#64748b;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none}
    .btn-back:hover{border-color:#cbd5e1;color:#0f172a}
    .spinner{display:inline-block;width:20px;height:20px;border:2.5px solid #d97706;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .guide-steps{text-align:left;background:#f5f3ff;border-radius:12px;padding:20px 24px;margin-top:32px}
    .guide-steps h3{font-size:14px;font-weight:700;color:#6366F1;margin-bottom:12px}
    .guide-steps ol{margin:0;padding-left:20px;color:#475569;font-size:14px;line-height:2}
  </style>
</head>
<body>

<nav class="nav scrolled" id="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2.5"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span>DeepSeal</span>
    </a>
    <div class="nav-links">
      <a href="index.html#features">功能</a>
      <a href="index.html#pricing">定价</a>
      <a href="index.html#download">下载</a>
      <a href="help.html">帮助</a>
    </div>
    <div class="nav-cta">
      <a href="index.html#download" class="btn btn-sm btn-primary">免费下载</a>
    </div>
  </div>
</nav>

<div class="result-page" id="resultPage">
  <!-- 动态渲染 -->
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-brand-col">
        <div class="footer-brand">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6366F1" stroke-width="2.2"><rect x="3" y="11" width="18" height="11" rx="2.5"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span>DeepSeal</span>
        </div>
        <p class="footer-desc">本地加密 · 零信任架构<br/>你的隐私只有你说了算。</p>
        <p class="footer-domain">hypergrad.cn</p>
      </div>
      <div class="footer-col">
        <h4>产品</h4>
        <a href="index.html#features">功能特性</a>
        <a href="index.html#security">加密架构</a>
        <a href="index.html#download">下载</a>
      </div>
      <div class="footer-col">
        <h4>资源</h4>
        <a href="blog.html">博客</a>
        <a href="help.html">帮助中心</a>
      </div>
      <div class="footer-col">
        <h4>公司</h4>
        <a href="about.html">关于我们</a>
        <a href="contact.html">联系我们</a>
      </div>
    </div>
    <div class="footer-bottom">
      <span>© 2026 DeepSeal by HyperGrad</span>
      <span>hypergrad.cn</span>
    </div>
  </div>
</footer>

<script>
const API_BASE = 'https://deepseal-pay.你的用户名.workers.dev';
const page = document.getElementById('resultPage');

async function main() {
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('order');

  if (!orderId) {
    renderFail('缺少订单信息');
    return;
  }

  renderPending();

  // 轮询查询（最多 60 秒）
  let attempts = 0;
  while (attempts < 30) {
    try {
      const resp = await fetch(API_BASE + '/api/query?order=' + encodeURIComponent(orderId));
      const data = await resp.json();

      if (data.status === 'paid' && data.code) {
        renderSuccess(data.code, data.plan);
        return;
      }
      if (data.status === 'not_found') {
        renderFail('订单不存在');
        return;
      }
    } catch (e) {
      // 网络错误，继续重试
    }

    await new Promise(r => setTimeout(r, 2000));
    attempts++;
  }

  renderFail('查询超时，请联系 deepseal@hypergrad.cn 获取激活码');
}

function renderPending() {
  page.innerHTML = `
    <div class="result-icon pending"><span class="spinner"></span></div>
    <h1>等待支付确认</h1>
    <p class="desc">正在查询支付结果，请稍候...</p>
  `;
}

function renderSuccess(code, plan) {
  const planText = plan === 'yearly' ? '1年订阅' : '1个月订阅';
  page.innerHTML = `
    <div class="result-icon success">✓</div>
    <h1>支付成功</h1>
    <p class="desc">已激活 DeepSeal 专业版（${planText}）</p>
    <div class="code-box">
      <div class="code-label">激活码</div>
      <div class="code-value" id="codeValue">${code}</div>
    </div>
    <div>
      <button class="btn-copy" onclick="copyCode()">复制激活码</button>
      <a href="index.html" class="btn-back">返回首页</a>
    </div>
    <div class="guide-steps">
      <h3>如何激活</h3>
      <ol>
        <li>复制上方激活码</li>
        <li>打开 DeepSeal 应用</li>
        <li>进入 设置 → 激活专业版</li>
        <li>粘贴激活码，点击激活</li>
      </ol>
    </div>
  `;
}

function renderFail(msg) {
  page.innerHTML = `
    <div class="result-icon fail">✕</div>
    <h1>支付未完成</h1>
    <p class="desc">${msg}</p>
    <div>
      <a href="buy.html" class="btn-copy" style="text-decoration:none">重新购买</a>
      <a href="index.html" class="btn-back">返回首页</a>
    </div>
  `;
}

function copyCode() {
  const code = document.getElementById('codeValue').textContent;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '已复制 ✓';
    setTimeout(() => { btn.innerHTML = '复制激活码'; }, 2000);
  });
}

main();
</script>
</body>
</html>
